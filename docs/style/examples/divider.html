<!doctype html>
<!--
  STATIC REFERENCE — Divider (Sala dos)
  Oxblood room between sections. Use once per page, max.
-->
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <title>Reference — Divider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=DM+Sans:opsz,wght@9..40,300..500&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../tokens.css" />
    <style>
      body {
        margin: 0;
      }

      .divider-room {
        background: var(--oxblood);
        color: var(--ivory);
        padding-block: clamp(60px, 9vw, 130px);
        padding-inline: var(--gutter);
      }

      .divider {
        display: grid;
        gap: 24px;
        text-align: center;
        max-width: 720px;
        margin: 0 auto;
      }

      .divider__mark {
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(245, 241, 234, 0.65);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        margin: 0;
      }
      .divider__mark::before,
      .divider__mark::after {
        content: "";
        width: 40px;
        height: 1px;
        background: var(--bronze);
        opacity: 0.7;
      }

      .divider__text {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 380;
        font-size: clamp(22px, 2.4vw, 30px);
        line-height: 1.4;
        color: rgba(245, 241, 234, 0.92);
        text-wrap: balance;
        margin: 0;
      }

      .divider__sign {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--bronze);
        margin: 6px 0 0;
      }
    </style>
  </head>
  <body>
    <section class="divider-room">
      <div class="divider">
        <p class="divider__mark"><span>Sala dos</span></p>
        <p class="divider__text">
          “Una tienda no se mide por el surtido, sino por las piezas que decide
          no traer.”
        </p>
        <p class="divider__sign">— Nota colgada en la pared del probador</p>
      </div>
    </section>
  </body>
</html>
