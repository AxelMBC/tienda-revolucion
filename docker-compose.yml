services:
  db:
    image: postgres:16-alpine
    container_name: revolucion-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: revolucion
      POSTGRES_PASSWORD: revolucion_dev
      POSTGRES_DB: revolucion
    ports:
      - "5433:5432"
    volumes:
      - revolucion-db-data:/var/lib/postgresql/data

volumes:
  revolucion-db-data:
